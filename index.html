<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amethyst Inventory</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="dark-theme">
    <div id="app">
        <!-- Login Screen -->
        <section id="login-screen" class="screen">
            <div class="card">
                <h1 class="neon-text">AMETHYST</h1>
                <p>Inventory Control System</p>
                <form id="login-form">
                    <input type="text" id="username" placeholder="Username" required>
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="submit" class="btn-primary">Initialize Access</button>
                </form>
                <div id="login-error" class="error-msg"></div>
            </div>
        </section>

        <!-- Role Selection -->
        <section id="role-selection" class="screen hidden">
            <div class="grid-container">
                <div class="role-card" onclick="app.showWorker()">
                    <div class="icon">📷</div>
                    <h3>Worker Portal</h3>
                    <p>Scanner Access Only</p>
                </div>
                <div class="role-card" onclick="app.requestOwnerAccess()">
                    <div class="icon">💎</div>
                    <h3>Owner Vault</h3>
                    <p>Full Management & Analytics</p>
                </div>
            </div>
        </section>

        <!-- PIN Modal -->
        <div id="pin-modal" class="modal hidden">
            <div class="modal-content">
                <h3>Secondary Authentication</h3>
                <p>Enter Owner Security PIN</p>
                <input type="password" id="owner-pin" maxlength="4" placeholder="****">
                <div class="modal-actions">
                    <button onclick="app.closePinModal()">Cancel</button>
                    <button class="btn-primary" onclick="app.verifyPin()">Verify</button>
                </div>
            </div>
        </div>

        <!-- Worker View (Scanner) -->
        <section id="worker-view" class="screen hidden">
            <div class="scanner-container">
                <div id="reader"></div>
                <div class="scanner-controls">
                    <button onclick="app.logout()">Logout</button>
                    <div id="scan-result" class="scan-status">Ready to scan...</div>
                </div>
            </div>
        </section>

        <!-- Owner Dashboard -->
        <section id="owner-view" class="screen hidden">
            <header>
                <h2 class="neon-text">Dashboard</h2>
                <div class="header-actions">
                    <button onclick="app.showScannerFromOwner()">Open Scanner</button>
                    <button onclick="app.showAddProductModal()">+ Add Product</button>
                    <button onclick="app.logout()">Logout</button>
                </div>
            </header>
            
            <div class="table-container">
                <table id="inventory-table">
                    <thead>
                        <tr>
                            <th>Barcode</th>
                            <th>Product</th>
                            <th>Stock</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-body"></tbody>
                </table>
            </div>
        </section>

        <!-- Add Product Modal -->
        <div id="add-product-modal" class="modal hidden">
            <div class="modal-content">
                <h3>Register New Item</h3>
                <form id="add-product-form">
                    <input type="text" id="new-barcode" placeholder="Barcode" required>
                    <input type="text" id="new-name" placeholder="Product Name" required>
                    <input type="number" id="new-qty" placeholder="Initial Quantity" required>
                    <textarea id="new-desc" placeholder="Description"></textarea>
                    <div class="modal-actions">
                        <button type="button" onclick="app.closeAddProductModal()">Cancel</button>
                        <button type="submit" class="btn-primary">Save Product</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
